<div class="qb-login relative overflow-hidden px-4 py-8">
  <mat-card class="qb-card qb-login-card">
    <mat-card-content>
      <div class="qb-login-header">
        <h1>Quiubox</h1>
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()" class="qb-login-form">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
        </mat-form-field>
        @if (errorMessage) {
          <p class="qb-error">{{ errorMessage }}</p>
        }
        <button mat-flat-button color="primary" type="submit" [disabled]="loading">
          {{ loading ? 'Entrando…' : 'Entrar' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
