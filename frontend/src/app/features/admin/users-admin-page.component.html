<div class="qb-page">
  <h1 class="qb-panel-title">Gestión de usuarios</h1>

  <mat-card class="qb-card qb-mb">
    <div class="qb-headline-row">
      <div>
        <h2 class="qb-h2">Usuarios</h2>
      </div>
      <button mat-flat-button color="primary" type="button" (click)="openCreateDialog()">Nuevo usuario</button>
    </div>
  </mat-card>

  <mat-card class="qb-card">
    <table mat-table [dataSource]="users" class="qb-table mat-elevation-z0">
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Usuario</th>
        <td mat-cell *matCellDef="let row">{{ row.username }}</td>
      </ng-container>
      <ng-container matColumnDef="nombres">
        <th mat-header-cell *matHeaderCellDef>Nombres</th>
        <td mat-cell *matCellDef="let row">{{ row.nombres }}</td>
      </ng-container>
      <ng-container matColumnDef="apellidos">
        <th mat-header-cell *matHeaderCellDef>Apellidos</th>
        <td mat-cell *matCellDef="let row">{{ row.apellidos }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let row">{{ row.email }}</td>
      </ng-container>
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let row">
          <span class="qb-role-badge" [class.admin]="row.role === 'admin'">{{ roleLabel(row) }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <div class="qb-row-actions">
            <button mat-icon-button type="button" [matMenuTriggerFor]="userMenu" aria-label="Acciones de usuario">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #userMenu="matMenu">
              <button mat-menu-item type="button" (click)="openViewDialog(row)">
                <mat-icon>visibility</mat-icon>
                <span>Ver</span>
              </button>
              <button mat-menu-item type="button" (click)="openEditDialog(row)">
                <mat-icon>edit</mat-icon>
                <span>Editar</span>
              </button>
              <button mat-menu-item type="button" class="qb-danger-action" (click)="remove(row)">
                <mat-icon>delete</mat-icon>
                <span>Eliminar</span>
              </button>
            </mat-menu>
          </div>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</div>
